<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Create Account</title> <!--Title of the Webpage-->
</head>
<style> 
    body {
    background-image: url("https://i.pinimg.com/1200x/68/39/ef/6839ef1b7f3dcb45fc2ffab818c6fae1.jpg");
    background-size: cover;       /* makes the image fill the screen */
    background-repeat: no-repeat; /* prevents tiling */
    background-attachment: fixed; /* keeps it steady when scrolling */
    background-position: center;  /* centers the image */
    font-family: 'Segoe UI', sans-serif;
}

</style>
<!--Body of the Webpage-->
<body class="container mt-4"> 
    <div class="mx-auto p-4 border rounded shadow" style="max-width: 500px; background-color: #f8f9fa;">
        <center>
           <div class="form-container">

        <h2>Create Account</h2>
        <br><br>

        <form action="/signup" method="POST">
            <!--Username and password text-->
            <input type="text" name="username" id= "username"placeholder="User:" class="form-control" required minlength="7">
            <br>

            <input type="password" name="password" id= "password" placeholder="Password:" class="form-control" required minlength="10">
            <br><br>

            <!--button for sign in-->
            <button class="btn btn-primary" py-click="sign_up">🌈 Sign In</button> 
            <div id="output2" class="mt-3"></div>
        </center>
    </div>
    <script type="py" src="main.py"></script>
        </form> 
          </div>
          </body>
          </html>
